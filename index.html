<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From Hash to Intelligence - Pitch Deck</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0f172a; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 1000;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .nav-bar button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #e2e8f0;
            padding: 6px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: background 0.2s;
        }
        .nav-bar button:hover { background: rgba(255,255,255,0.15); }
        .nav-bar button:disabled { opacity: 0.3; cursor: default; }

        .nav-bar .counter {
            color: #94a3b8;
            font-size: 14px;
            min-width: 60px;
            text-align: center;
        }
    </style>
</head>
<body>
    <iframe id="slideFrame" src="01.html"></iframe>
    <div class="nav-bar">
        <button id="prevBtn" onclick="go(-1)">&#8592; Prev</button>
        <span class="counter" id="counter">1 / 12</span>
        <button id="nextBtn" onclick="go(1)">Next &#8594;</button>
    </div>

    <script>
        const total = 12;
        let current = 1;

        function update() {
            const num = String(current).padStart(2, '0');
            document.getElementById('slideFrame').src = num + '.html';
            document.getElementById('counter').textContent = current + ' / ' + total;
            document.getElementById('prevBtn').disabled = current === 1;
            document.getElementById('nextBtn').disabled = current === total;
        }

        function go(dir) {
            const next = current + dir;
            if (next >= 1 && next <= total) { current = next; update(); }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
        });

        update();
    </script>
</body>
</html>
