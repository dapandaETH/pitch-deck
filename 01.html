<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1 - From Hash to Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
        }
        
        .slide-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        /* Background Decorations */
        .bg-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
        }
        
        .orb-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
            top: -200px;
            right: -150px;
        }
        
        .orb-2 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            bottom: -150px;
            left: -100px;
        }
        
        .orb-3 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            top: 40%;
            left: 30%;
            opacity: 0.2;
        }
        
        /* Grid Pattern Overlay */
        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 2;
        }
        
        /* Main Content Area */
        .content-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
            position: relative;
            z-index: 10;
        }
        
        /* Logo/Icon */
        .logo-icon {
            margin-bottom: 45px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .icon-container {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #14b8a6 0%, #8b5cf6 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 70px rgba(139, 92, 246, 0.5);
            position: relative;
        }
        
        .icon-container::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(135deg, #14b8a6 0%, #8b5cf6 50%, #06b6d4 100%);
            border-radius: 32px;
            z-index: -1;
            opacity: 0.6;
            filter: blur(20px);
        }
        
        .icon-svg {
            width: 55px;
            height: 55px;
            fill: white;
        }
        
        /* Title Section */
        .title-section {
            text-align: center;
            max-width: 1100px;
        }
        
        .main-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 72px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 50%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1.5px;
        }
        
        .subtitle {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 40px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .tagline {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.5;
            background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }
        
        /* Decorative Divider */
        .divider {
            width: 140px;
            height: 4px;
            background: linear-gradient(90deg, #14b8a6 0%, #8b5cf6 100%);
            margin: 50px auto 0;
            border-radius: 2px;
            box-shadow: 0 0 25px rgba(20, 184, 166, 0.6);
        }
        
        /* Footer */
        .footer {
            flex: 0 0 auto;
            padding: 28px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 10;
        }
        
        .page-number {
            font-size: 15px;
            color: #64748b;
            font-weight: 500;
        }
        
        .presentation-title {
            font-size: 14px;
            color: #64748b;
            font-weight: 400;
            max-width: 600px;
            text-align: right;
        }
        
        /* Responsive Adjustments */
        @media (max-height: 750px) {
            .main-title { font-size: 58px; margin-bottom: 28px; }
            .subtitle { font-size: 20px; margin-bottom: 32px; }
            .tagline { font-size: 24px; }
            .content-wrapper { padding: 40px 70px; }
            .divider { margin-top: 38px; }
            .icon-container { width: 85px; height: 85px; border-radius: 24px; }
            .icon-svg { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="bg-decoration">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>
        <div class="grid-pattern"></div>
        
        <!-- Main Content -->
        <div class="content-wrapper">
            <!-- Logo Icon -->
            <div class="logo-icon">
                <div class="icon-container">
                    <svg class="icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
            </div>
            
            <!-- Title Content -->
            <div class="title-section">
                <h1 class="main-title">From Hash to Intelligence</h1>
                <p class="subtitle">Transforming Bitcoin Mining Infrastructure into High-Performance AI Inference Centers</p>
                <p class="tagline">Powering the Future of Open-Source LLM Deployment</p>
                
                <div class="divider"></div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <span class="page-number">1 / 12</span>
            <span class="presentation-title">Crypto-to-AI Infrastructure Transformation</span>
        </div>
    </div>
</body>
</html>
