<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1 - From Hash to Intelligence</title>
    <link rel="stylesheet" href="0xglobal.css">
    <style>
        body {
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--foreground);
            display: flex;
            flex-direction: column;
        }
        
        .slide-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .bg-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.06;
        }
        
        .orb-1 {
            width: 550px;
            height: 550px;
            background: var(--accent-teal-gradient);
            top: -200px;
            right: -150px;
        }
        
        .orb-2 {
            width: 450px;
            height: 450px;
            background: var(--accent-purple-gradient);
            bottom: -150px;
            left: -100px;
        }
        
        .orb-3 {
            width: 350px;
            height: 350px;
            background: var(--accent-teal-gradient);
            top: 40%;
            left: 30%;
            opacity: 0.06;
        }
        
        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 2;
        }
        
        .content-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
            position: relative;
            z-index: 10;
        }
        
        .logo-icon {
            margin-bottom: 45px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .icon-container {
            width: 100px;
            height: 100px;
            background: var(--hero-gradient);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-lg);
            position: relative;
        }
        
        .icon-container::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: var(--hero-gradient);
            border-radius: 32px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(20px);
        }
        
        .icon-svg {
            width: 55px;
            height: 55px;
            fill: white;
        }
        
        .title-section {
            text-align: center;
            max-width: 1100px;
        }
        
        .main-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 72px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 35px;
            color: var(--text-heading);
            letter-spacing: -1.5px;
        }
        
        .subtitle {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .tagline {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.5;
            background: var(--hero-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }
        
        .divider {
            width: 140px;
            height: 4px;
            background: var(--hero-gradient);
            margin: 50px auto 0;
            border-radius: 2px;
        }
        
        .footer {
            flex: 0 0 auto;
            padding: 28px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }
        
        .page-number {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .presentation-title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 600px;
            text-align: right;
        }
        
        @media (max-height: 750px) {
            .main-title { font-size: 58px; margin-bottom: 28px; }
            .subtitle { font-size: 20px; margin-bottom: 32px; }
            .tagline { font-size: 24px; }
            .content-wrapper { padding: 40px 70px; }
            .divider { margin-top: 38px; }
            .icon-container { width: 85px; height: 85px; border-radius: 24px; }
            .icon-svg { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="bg-decoration">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>
        <div class="grid-pattern"></div>
        
        <div class="content-wrapper">
            <div class="logo-icon">
                <div class="icon-container">
                    <svg class="icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
            </div>
            
            <div class="title-section">
                <h1 class="main-title">From Hash to Intelligence</h1>
                <p class="subtitle">Transforming Bitcoin Mining Infrastructure into High-Performance AI Inference Centers</p>
                <p class="tagline">Powering the Future of Open-Source LLM Deployment</p>
                
                <div class="divider"></div>
            </div>
        </div>
        
        <div class="footer">
            <span class="page-number">1 / 12</span>
            <span class="presentation-title">Crypto-to-AI Infrastructure Transformation</span>
        </div>
    </div>
</body>
</html>
